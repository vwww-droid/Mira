name: release-tag-build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build and publish, for example v1.1.2'
        required: true
        type: string

permissions:
  contents: write

env:
  MIRA_RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  build-python-android:
    name: Build Python package and Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.MIRA_RELEASE_TAG }}
          submodules: recursive
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate release version
        run: |
          chmod +x ./mira-build
          ./mira-build --validate-only --release-tag "${MIRA_RELEASE_TAG}"

      - name: Build Python package and Android APK
        run: |
          python -m pip install --upgrade pip build wheel setuptools
          chmod +x ./gradlew ./mira-build
          ./mira-build --target python --target android --release-tag "${MIRA_RELEASE_TAG}"

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mira-python-${{ env.MIRA_RELEASE_TAG }}
          path: |
            dist/python/**
            dist/release-manifest.json
          if-no-files-found: error

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mira-android-${{ env.MIRA_RELEASE_TAG }}
          path: |
            dist/android/**
            dist/release-manifest.json
          if-no-files-found: error

  build-ios-generic:
    name: Build iOS unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.MIRA_RELEASE_TAG }}
          submodules: recursive
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install iOS build prerequisites
        run: |
          brew install llvm lld ninja pkg-config libarchive zig
          python -m pip install --upgrade pip meson

      - name: Validate release version
        run: |
          chmod +x ./mira-build
          ./mira-build --validate-only --release-tag "${MIRA_RELEASE_TAG}"

      - name: Prepare iOS native dependencies
        run: |
          MIRA_ISH_SDK=iphoneos \
          MIRA_ISH_BUILD_DIR="$PWD/build/ios-ish-device-libs" \
          bash ./tools/ios/build-ish-libs.sh
          bash ./tools/ios/build-frida-musl-devkit.sh
          MIRA_ISH_SKIP_COMPILEALL=1 \
          MIRA_ISH_ROOTFS_OUTPUT="$PWD/build/ios-mira-device-native-relay-derived/Build/Products/Debug-iphoneos/Mira.app/MiraISHRoot.fakefs" \
          bash ./tools/ios/prepare-ish-rootfs.sh

      - name: Build iOS unsigned IPA with generic iphoneos destination
        run: |
          python -m pip install --upgrade pip build wheel setuptools
          chmod +x ./mira-build
          MIRA_ISH_SKIP_COMPILEALL=1 ./mira-build --target ios --ios-destination-mode generic --release-tag "${MIRA_RELEASE_TAG}"

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mira-ios-${{ env.MIRA_RELEASE_TAG }}
          path: |
            dist/ios/**
            dist/release-manifest.json
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs:
      - build-python-android
      - build-ios-generic
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v8
        with:
          name: mira-python-${{ env.MIRA_RELEASE_TAG }}
          path: release-assets/python

      - name: Download Android artifacts
        uses: actions/download-artifact@v8
        with:
          name: mira-android-${{ env.MIRA_RELEASE_TAG }}
          path: release-assets/android

      - name: Download iOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: mira-ios-${{ env.MIRA_RELEASE_TAG }}
          path: release-assets/ios

      - name: Publish assets to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.MIRA_RELEASE_TAG }}
          generate_release_notes: true
          files: |
            release-assets/python/python/*
            release-assets/android/android/*
            release-assets/ios/ios/*
